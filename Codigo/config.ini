; Archivo de configuración para el Agente de Comunicaciones
; Es RESPONSABILIDAD del administrador del sistema proteger este archivo
; utilizando los permisos del sistema operativo (chmod 600 / permisos NTFS).

[general]
# ID de esta sucursal. Debe coincidir con un `id_sucursal` en la tabla `sucursales_comunicacion`.
branch_id = 1

[database_local]
host = localhost
port = 3306
user = root
password = clasic
db = zafiro_svc

[panel]
; Host y puerto del panel de control FastAPI para telemetría y comandos.
host = 192.168.1.100
port = 8000

[replication]
# Server ID para la conexión de replicación que lee el binlog LOCAL.
# ¡¡CADA AGENTE DEBE TENER UN local_server_id DIFERENTE DEL RESTO DE AGENTES!!
local_server_id = 100

# Server ID para la conexión de replicación que lee el binlog CENTRAL.
# Puede ser el mismo para todos los agentes, pero debe ser único en el master central.
central_server_id = 101

# Tamaño máximo de la cola en memoria. Evita que el agente consuma toda la RAM
# si el consumidor (transmisor) es lento o la red está caída.
max_queue_size = 5000

# Bases de datos a incluir, separadas por comas.
# Si se deja en blanco, la replicación fallará, se debe especificar al menos una.
included_dbs = zafiro_svc

# Tablas a incluir, separadas por comas. Si se deja en blanco, se procesan TODAS.
# Ejemplo: zafiro_svc.articulos,zafiro_svc.stock
included_tables = 

